syntax = "proto3";

package payment;

option go_package = "./proto/payment/iyzico";

service PaymentService {
  rpc ProcessPayment (ProcessPaymentRequest) returns (ProcessPaymentResponse);
  rpc UpdateStatus (ProcessUpdateStatusRequest) returns (ProcessUpdateStatusResponse);
}

message Card {
  string holder_name = 1;
  string number = 2;
  string expire_year = 3;
  string expire_month = 4;
  string cvc = 5;
}

// Müşteri / Alıcı Bilgileri
message Buyer {
  string id = 1;
  string name = 2;
  string surname = 3;
  string identity_number = 4;
  string email = 5;
  string gsm_number = 6;
  string registration_date = 7;
  string last_login_date = 8;
  string address = 9;
  string city = 10;
  string country = 11;
  string zip_code = 12;
  string ip = 13;
}

message Address {
	string address = 1; 
	string zipCode = 2;   
	string contactName = 3;
	string city = 4;
	string country = 5;
}

// Sepet Öğesi Bilgileri
message BasketItem {
  string id = 1;
  string name = 2;
  string category1 = 3;
  string item_type = 4;
  int64 price = 5; // Kuruş cinsinden
}

// Ana Ödeme Nesnesi
message ProcessPaymentRequest {
  string id = 1;
  string user_id = 2;
  string reference_id = 3;   // Sipariş ID vb.
  string reference_type = 4; // ORDER, SUBSCRIPTION vb.
  int64 amount = 5;           // Kuruş cinsinden
  string currency = 6;        // ISO 4217 (TRY, USD vb.)
  
  Card card = 7;
  Buyer buyer = 8;

  Address shippingAddress = 9;
  Address billingAddress = 10;

  repeated BasketItem basket_items = 11;

  string payment_method = 12; // STRIPE, IYZICO vb.
  string status = 13;

  string transaction_id = 14;
  string failure_reason = 15;

  string conversation_id=16;
  
}

// Ödeme İşlem Sonucu
message ProcessPaymentResponse {
  string transaction_id = 1;
  bool success = 2;
  string three_ds_html_content = 3;
  string id = 4;
  string status = 5;
  string error_message = 6;
}




message ProcessUpdateStatusRequest {
  string status = 1;
  string id = 2;
  string mdStatus = 3;
  string signature = 4;
  string transaction_id = 5;
}


message ProcessUpdateStatusResponse {
  string id = 1;
  string status = 2;
  string error_message = 3;
}


