syntax = "proto3";

package auth;

option go_package = "./proto";

service AuthService {
    rpc Register (RegisterRequest) returns (RegisterResponse);
    rpc Update (UpdateRequest) returns (RegisterResponse);
    rpc Login (LoginRequest) returns (LoginResponse);
    rpc GetJWKS (JWKSRequest) returns (JWKSResponse);
}

message RegisterRequest {
    string email = 1;
    string password = 2;
    string first_name = 3;
    string last_name = 4;
    string role = 5;
}

message RegisterResponse {
    string id = 1; 
    string message = 2;
}

message UpdateRequest {
    string id = 1;
    string email = 2;
    string password = 3;
    string first_name = 4;
    string last_name = 5;
    string role = 6;
}

message LoginRequest {
    string email = 1;
    string password = 2;
}

message LoginResponse {
    string token = 1;
}

message JWKSRequest {}

message JWKSResponse {
    string jwks_json = 1;
}